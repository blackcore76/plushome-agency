<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>문의게시판 — PlusHome Agency</title>
<script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<link rel="stylesheet" href="style.css?v=1" />
<link rel="stylesheet" href="board.css?v=1" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html#top"><span class="mark"></span>PlusHome Agency</a>
    <nav class="nav-links">
      <a href="pwa.html">PWA란?</a>
      <a href="process.html">제작과정</a>
      <a href="portfolio.html">포트폴리오</a>
      <a href="contact.html">문의</a>
    </nav>
    <div class="nav-right">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="테마 전환">🌙</button>
      <button type="button" class="admin-trigger" id="admin-trigger" aria-label="관리자">+</button>
      <button class="nav-toggle" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main>
  <section class="section" style="padding-top:80px">
    <div class="wrap">
      <span class="label">문의</span>
      <h2 style="font-size:clamp(28px,4vw,44px);letter-spacing:-0.6px;margin:14px 0 16px;">문의게시판</h2>
      <p style="color:var(--muted);font-size:16px;margin-bottom:40px;">PWA 제작 관련 문의를 남겨주세요.<br>모든 글은 비밀글로 처리되며, 작성 시 입력한 비밀번호로만 열람할 수 있습니다.</p>

      <div id="board-root">

        <div id="view-list">
          <div class="board-toolbar">
            <span id="list-total" class="board-total"></span>
            <button type="button" class="btn btn-primary" id="btn-new">문의 작성</button>
          </div>
          <div class="table-scroll">
            <table class="board-table">
              <thead>
                <tr><th>제목</th><th>작성자</th><th>작성일</th><th>상태</th></tr>
              </thead>
              <tbody id="list-body">
                <tr><td colspan="4" class="board-empty">불러오는 중…</td></tr>
              </tbody>
            </table>
          </div>
          <div class="board-pagination" id="pagination"></div>
        </div>

        <div id="view-write" hidden>
          <form id="form-write" class="board-form" novalidate>
            <div class="field-row">
              <label>제목 <input type="text" name="title" maxlength="100" required /></label>
            </div>
            <div class="field-row two">
              <label>이름 <input type="text" name="authorName" maxlength="40" required /></label>
              <label>연락처(전화 또는 이메일) <input type="text" name="contact" maxlength="100" required /></label>
            </div>
            <div class="field-row">
              <label>비밀번호 (4~30자, 글 열람 시 필요) <input type="password" name="password" minlength="4" maxlength="30" required /></label>
            </div>
            <div class="field-row">
              <label>문의 내용 <textarea name="content" rows="7" maxlength="2000" required></textarea></label>
            </div>
            <div class="field-row">
              <span class="field-label">참고 링크 (선택, 최대 3개)</span>
              <input type="text" name="link1" placeholder="plushome.kr" />
              <input type="text" name="link2" placeholder="plushome.kr" />
              <input type="text" name="link3" placeholder="plushome.kr" />
            </div>
            <div class="field-row">
              <span class="field-label">스크린샷 (선택, 최대 3장)</span>
              <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" multiple />
              <div id="file-preview" class="file-preview"></div>
            </div>
            <input type="text" name="website" class="hp-field" tabindex="-1" autocomplete="off" />
            <div id="form-error" class="form-error" hidden></div>
            <div class="field-row actions">
              <button type="button" class="btn btn-ghost" id="btn-cancel">취소</button>
              <button type="submit" class="btn btn-primary" id="btn-submit">문의 등록</button>
            </div>
          </form>
        </div>

        <div id="view-detail" hidden>
          <button type="button" class="btn btn-ghost" id="btn-back">← 목록으로</button>
          <div id="detail-body" class="detail-body"></div>
        </div>

      </div>
    </div>
  </section>
</main>

<div id="password-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <h3>비밀글입니다</h3>
    <p>작성 시 입력한 비밀번호를 입력해주세요.</p>
    <input type="password" id="modal-password" maxlength="30" />
    <div id="modal-error" class="form-error" hidden></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="modal-cancel">취소</button>
      <button type="button" class="btn btn-primary" id="modal-confirm">확인</button>
    </div>
  </div>
</div>

<div id="confirm-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="confirm-cancel">취소</button>
      <button type="button" class="btn btn-danger" id="confirm-ok">확인</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-top">
      <a class="brand" href="index.html#top"><span class="mark"></span>PlusHome Agency</a>
      <div class="footer-links">
        <a href="company.html">회사소개</a>
        <a href="pricing.html">요금/견적안내</a>
        <a href="faq.html">FAQ</a>
        <a href="privacy.html">개인정보처리방침</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 PlusHome Agency</span>
      <span>plushome.co.kr</span>
    </div>
  </div>
</footer>

<script src="app.js?v=1"></script>
<script type="module" src="admin-auth.js?v=1"></script>
<script type="module" src="board.js?v=1"></script>
</body>
</html>
