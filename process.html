<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>제작과정 히스토리 — PlusHome Agency</title>
<script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<link rel="stylesheet" href="style.css?v=2" />
<link rel="stylesheet" href="board.css?v=2" />
<link rel="stylesheet" href="process.css?v=1" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html#top"><span class="mark"></span>PlusHome Agency</a>
    <nav class="nav-links">
      <a href="pwa.html">PWA란?</a>
      <a href="process.html">제작과정</a>
      <a href="portfolio.html">포트폴리오</a>
      <a href="contact.html">문의</a>
    </nav>
    <div class="nav-right">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="테마 전환">🌙</button>
      <button type="button" class="admin-trigger" id="admin-trigger" aria-label="관리자">+</button>
      <button class="nav-toggle" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main>
  <section class="section" style="padding-top:80px">
    <div class="wrap">
      <span class="label">제작과정</span>
      <h2 style="font-size:clamp(28px,4vw,44px);letter-spacing:-0.6px;margin:14px 0 16px;">제작과정 히스토리</h2>
      <p style="color:var(--muted);font-size:16px;margin-bottom:40px;">실제 프로젝트의 작업 과정을 스크린샷으로 공개합니다.</p>

      <div id="process-root">

        <div id="view-list">
          <div class="board-toolbar">
            <span id="list-total" class="board-total"></span>
            <button type="button" class="btn btn-primary" id="btn-new-project" hidden>프로젝트 등록</button>
          </div>
          <div class="project-grid" id="project-grid"></div>
          <div class="board-pagination" id="pagination"></div>
        </div>

        <div id="view-detail" hidden>
          <button type="button" class="btn btn-ghost" id="btn-back">← 목록으로</button>
          <div id="detail-body" class="detail-body"></div>
        </div>

        <div id="view-write" hidden>
          <form id="form-project" class="board-form" novalidate>
            <div class="field-row">
              <label>제목 (예: 홍길동님 — ○○사이트) <input type="text" name="title" maxlength="100" required /></label>
            </div>
            <div class="field-row two">
              <label>의뢰일 <input type="date" name="startDate" required /></label>
              <label>완료일 (선택) <input type="date" name="endDate" /></label>
            </div>
            <div class="field-row">
              <label>상태
                <select name="status">
                  <option value="진행중">진행중</option>
                  <option value="완료">완료</option>
                </select>
              </label>
            </div>
            <div id="existing-images" class="field-row" hidden>
              <span class="field-label">기존 스크린샷</span>
              <div id="existing-preview" class="file-preview"></div>
            </div>
            <div class="field-row">
              <span class="field-label">스크린샷 추가 (최대 20장, 550px 리사이즈)</span>
              <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" multiple />
              <div id="file-preview-list"></div>
            </div>
            <div id="form-error" class="form-error" hidden></div>
            <div class="field-row actions">
              <button type="button" class="btn btn-ghost" id="btn-cancel">취소</button>
              <button type="submit" class="btn btn-primary" id="btn-submit">등록</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>
</main>

<div id="confirm-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="confirm-cancel">취소</button>
      <button type="button" class="btn btn-danger" id="confirm-ok">확인</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-top">
      <a class="brand" href="index.html#top"><span class="mark"></span>PlusHome Agency</a>
      <div class="footer-links">
        <a href="company.html">회사소개</a>
        <a href="pricing.html">요금/견적안내</a>
        <a href="faq.html">FAQ</a>
        <a href="privacy.html">개인정보처리방침</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 PlusHome Agency</span>
      <span>plushome.co.kr</span>
    </div>
  </div>
</footer>

<script src="app.js?v=1"></script>
<script type="module" src="admin-auth.js?v=1"></script>
<script type="module" src="process.js?v=1"></script>
</body>
</html>
